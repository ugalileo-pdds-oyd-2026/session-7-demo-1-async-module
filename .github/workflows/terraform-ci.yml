name: Terraform CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'

env:
  TF_VERSION: "1.10.5"
  AWS_REGION: "us-west-2"
  TF_DIR: "./infra"

jobs:
  ci:
    name: Lint and Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt check
        run: terraform -chdir=${{ env.TF_DIR }} fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform -chdir=${{ env.TF_DIR }} init -backend=false

      - name: Zip lambda code
        run: |
          cd app
          zip -r app.zip lambda_function.py

      - name: Terraform validate
        run: terraform -chdir=${{ env.TF_DIR }} validate

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init (dev)
        run: terraform -chdir=${{ env.TF_DIR }} init -backend=false

      - name: Terraform plan (dev)
        id: plan
        run: |
          terraform -chdir=${{ env.TF_DIR }} plan \
            -var-file=envs/dev/dev.tfvars \
            -no-color 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('plan_output.txt', 'utf8');
            const status = '${{ steps.plan.outcome }}' === 'success' ? '✅' : '❌';
            const body = `## Terraform Plan (dev) ${status}\n\`\`\`\n${planOutput.slice(0, 60000)}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
